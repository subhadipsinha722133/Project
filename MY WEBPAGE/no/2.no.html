<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subhadip Sinha - Portfolio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
    header { height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; position: relative; z-index: 1; }
    h1 { font-size: 3rem; }
    .section { padding: 60px 10%; }
    h2 { margin-bottom: 20px; font-size: 2.5rem; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; backdrop-filter: blur(10px); transition: transform 0.3s ease; }
    .card:hover { transform: translateY(-10px) scale(1.05); }
    .video-container video { width: 100%; border-radius: 10px; }
    .skills-bar { background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; margin-bottom: 10px; }
    .skills-bar span { display: block; height: 20px; background: linear-gradient(90deg, #ff9800, #ff5722); }
    form input, form textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: none; border-radius: 5px; }
    form button { padding: 10px 20px; background: #ff9800; border: none; border-radius: 5px; cursor: pointer; }
    canvas { position: fixed; top: 0; left: 0; z-index: 0; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<header>
    <h1>Subhadip Sinha</h1>
    <p>AI Engineer | Author | Video Editor</p>
</header>
<section class="section">
    <h2>Projects</h2>
    <div class="grid" id="projects"></div>
</section>
<section class="section">
    <h2>Books</h2>
    <div class="grid" id="books"></div>
</section>
<section class="section">
    <h2>Video Editing</h2>
    <div class="grid" id="videos"></div>
</section>
<section class="section">
    <h2>Skills</h2>
    <div class="skills-bar"><span style="width:90%"></span></div>
    <div class="skills-bar"><span style="width:85%"></span></div>
    <div class="skills-bar"><span style="width:80%"></span></div>
</section>
<section class="section">
    <h2>About Me</h2>
    <p style="text-align:center; max-width:600px; margin:auto;">I am Subhadip Sinha, passionate AI Engineer, author of 8 books, and video editor with experience in creative and technical domains.</p>
</section>
<section class="section">
    <h2>Contact</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message" rows="5" required></textarea>
        <button type="submit">Send</button>
    </form>
</section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    // Populate sections dynamically
    const projectData = Array.from({length:8}, (_,i)=>`Project ${i+1}`);
    document.getElementById('projects').innerHTML = projectData.map(p=>`<div class='card'>${p}</div>`).join('');
    const bookData = Array.from({length:8}, (_,i)=>`Book ${i+1}`);
    document.getElementById('books').innerHTML = bookData.map(b=>`<div class='card'>${b}</div>`).join('');
    const videoData = Array.from({length:8}, (_,i)=>`<div class='video-container'><video controls src='video${i+1}.mp4'></video></div>`);
    document.getElementById('videos').innerHTML = videoData.join('');

    // Three.js Background Animation
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('bg'), alpha: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.position.z = 5;

    const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
    const material = new THREE.MeshStandardMaterial({color: 0xff6347, wireframe: true});
    const torusKnot = new THREE.Mesh(geometry, material);
    scene.add(torusKnot);

    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    function animate() {
        requestAnimationFrame(animate);
        torusKnot.rotation.x += 0.01;
        torusKnot.rotation.y += 0.01;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
