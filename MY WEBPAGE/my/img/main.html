/* hedder */

nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(39, 38, 55, 0.8);
            backdrop-filter: blur(5px);
            transform: translateY(0);
            transition: transform 0.5s ease, background 0.3s;
        }
        
        nav.scrolled {
            background: rgba(47, 46, 65, 0.95);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        nav.hidden {
            transform: translateY(-100%);
        }
        
        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--light-color);
            text-decoration: none;
            transform-style: preserve-3d;
            animation: float 3s ease-in-out infinite;
        }
        
        .logo span {
            color: var(--primary-color);
        }
        
        nav ul {
            display: flex;
            gap: 40px;
        }
        
        nav ul li {
            list-style: none;
        }
        
        nav ul li a {
            text-decoration: none;
            color: var(--light-color);
            font-weight: 500;
            font-size: 1.1rem;
            position: relative;
            padding: 5px 0;
            transition: color 0.3s;
        }
        
        nav ul li a:hover {
            color: var( --secondary-color);
        }
        
        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }
        
        nav ul li a:hover::after {
            width: 100%;
        }

<script>



// Typing Effect
   const text = ["AIML Engineer...", "Web Developer...", "Video Editor..."];
let i = 0, j = 0, currentText = "", isDeleting = false, isPaused = false;

function typeEffect() {
    const typingElement = document.getElementById("typing");
    const currentString = text[i];
    
    // Calculate typing/deleting speed (faster when deleting)
    const typeSpeed = isDeleting ? 30 : 100;
    const pauseBetween = 1000;
    
    // Current text update
    currentText = currentString.substring(0, j);
    typingElement.innerHTML = currentText;
    
    // Add blinking cursor effect
    typingElement.classList.add('typing-cursor');
    
    // Animation logic
    if (!isDeleting && j < currentString.length) {
        j++;
        setTimeout(typeEffect, typeSpeed);
    } 
    else if (!isDeleting && j === currentString.length) {
        isDeleting = true;
        setTimeout(typeEffect, pauseBetween);
    } 
    else if (isDeleting && j > 0) {
        j--;
        setTimeout(typeEffect, typeSpeed);
    } 
    else {
        isDeleting = false;
        i = (i + 1) % text.length;
        setTimeout(typeEffect, typeSpeed / 2);
    }
}

// Start the effect when the page loads
document.addEventListener('DOMContentLoaded', () => {
    typeEffect();
    
    // Add CSS for cursor effect
    const style = document.createElement('style');
    style.textContent = `
        .typing-cursor {
            border-right: 2px solid #fff;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0%, 100% { border-color: transparent; }
            50% { border-color: #fff; }
        }
    `;
    document.head.appendChild(style);
});





   // Three.js 3D Animation
const container = document.getElementById('canvas-container');

// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

// Particles
const particlesGeometry = new THREE.BufferGeometry();
const particleCount = 1000;

const posArray = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 10;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const particlesMaterial = new THREE.PointsMaterial({
    size: 0.02,
    color: 0xa29bfe,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending
});

const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

// Torus Knot
const geometry = new THREE.TorusKnotGeometry(0.5, 0.2, 100, 16);
const material = new THREE.MeshBasicMaterial({ 
    color: 0x6c5ce7,
    wireframe: true,
    transparent: true,
    opacity: 0.7
});
const torusKnot = new THREE.Mesh(geometry, material);
scene.add(torusKnot);

camera.position.z = 3;

// Handle window resize
function onWindowResize() {
    // Update camera aspect ratio
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    
    // Update renderer size
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    // Adjust particle size based on screen size
    const particleSize = Math.min(0.02, 0.01 + (window.innerWidth * 0.00001));
    particlesMaterial.size = particleSize;
}

// Add event listener for window resize
window.addEventListener('resize', onWindowResize, false);

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    
    torusKnot.rotation.x += 0.005;
    torusKnot.rotation.y += 0.005;
    
    particlesMesh.rotation.y += 0.001;
    
    renderer.render(scene, camera);
}

// Initial call to handle any initial sizing issues
onWindowResize();
animate();

    









</script>
